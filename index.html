<!DOCTYPE html>
<html>
<head>
<title>Jakir Bedding House</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#111;
color:white;
text-align:center;
padding:60px 20px;
}

.header h1{
font-size:50px;
margin:0;
}

.header p{
font-size:20px;
}

.gallery{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h3{
text-align:center;
padding:15px;
}
</style>
</head>

<body>

<div class="header">
<h1>Jakir Bedding House</h1>
<p>Premium Curtain Collection</p>
</div>

<div class="gallery">

<div class="card">
<h3>Curtain Collection 1</h3>
</div>

<div class="card">
<h3>Curtain Collection 2</h3>
</div>

<div class="card">
<h3>Curtain Collection 3</h3>
</div>

</div>

</body>
</html>
